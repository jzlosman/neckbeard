name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install development tools
        run: python -m pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .
      - name: Test source with coverage gate
        run: |
          coverage run -m unittest discover
          coverage combine
          coverage report
      - name: Build wheel and source distribution
        run: python -m build
      - name: Check installed wheel in a fresh repository
        shell: bash
        run: |
          python -m venv .installed-venv
          .installed-venv/bin/python -m pip install --no-deps dist/*.whl
          repo=$(mktemp -d)
          result=$(mktemp)
          trap 'rm -rf "$repo" "$result"' EXIT
          git -C "$repo" init -q
          git -C "$repo" config user.email test@example.com
          git -C "$repo" config user.name 'Test User'
          cat >"$repo/.neckbeard.toml" <<'EOF'
          [scope]
          allow_dependency_changes = false
          allow = ["allowed/**"]
          EOF
          git -C "$repo" add .neckbeard.toml
          git -C "$repo" commit -qm policy
          mkdir "$repo/allowed"
          printf 'ok\n' >"$repo/allowed/file.txt"
          (
            cd "$repo"
            env -u PYTHONPATH "$GITHUB_WORKSPACE/.installed-venv/bin/neckbeard" check --json >"$result"
          )
          RESULT="$result" python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path(os.environ["RESULT"]).read_text(encoding="utf-8"))
          assert payload["verdict"] == "pass", payload
          assert payload["exit_code"] == 0, payload
          PY
